<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Blockchain Notary DApp{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="fas fa-shield-alt"></i> Blockchain Notary
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">
                <i class="fas fa-home"></i> Home
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/notarize">
                <i class="fas fa-stamp"></i> Notarize
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/verify">
                <i class="fas fa-check-circle"></i> Verify
              </a>
            </li>
          </ul>
          <div class="ms-3">
            <button id="connectWallet" class="btn btn-outline-light btn-sm">
              <i class="fas fa-wallet"></i> Connect Wallet
            </button>
            <span
              id="walletAddress"
              class="text-light ms-2"
              style="display: none"
            ></span>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main>{% block content %}{% endblock %}</main>

    <!-- Footer -->
    <footer class="bg-dark text-light py-4 mt-5">
      <div class="container text-center">
        <p class="mb-2">
          <i class="fas fa-cube"></i> Blockchain-Based Document Notarization
          System
        </p>
        <p class="text-muted small mb-0">
          Built with Flask, Solidity & Web3.js |
          <a
            href="https://github.com/yourusername/notary-dapp"
            class="text-decoration-none"
            target="_blank"
          >
            <i class="fab fa-github"></i> GitHub
          </a>
        </p>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Web3.js -->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

    <!-- MetaMask JS -->
    <script src="{{ url_for('static', filename='js/metamask.js') }}"></script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
